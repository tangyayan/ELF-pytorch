name: elf-pytorch
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      # B200 (sm_100) requires CUDA 12.8+ wheels; the extra-index-url below pins the
      # cu128 channel. For older GPUs, drop the --extra-index-url line and let pip
      # pick the default cu121/cu124 wheels.
      # - --extra-index-url=https://download.pytorch.org/whl/cu124
      - torch
      - torchvision
      - lightning
      - transformers>=4.41.2,<4.45.0
      - tokenizers>=0.19.0
      - sentencepiece>=0.1.99
      - datasets>=2.19.0
      - huggingface-hub>=0.23.0
      - safetensors>=0.4.0
      - accelerate>=0.30.0
      - einops
      - numpy>=1.26.4,<2.0.0
      - scipy>=1.12.0
      - PyYAML>=6.0.1
      - tqdm>=4.66.0
      - sacrebleu
      - rouge-score
      - matplotlib>=3.8.0
      - requests>=2.31.0
      # Optional logging
      - wandb>=0.16.6
      # Optional: FlashAttention (use_flash: true) — install out-of-tree per
      # https://github.com/Dao-AILab/flash-attention
